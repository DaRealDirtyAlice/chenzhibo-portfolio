    <rect x="574" y="304" width="360" height="280" rx="7" fill="#0b1b28" stroke="#24445f" stroke-width="2"/><text x="608" y="356" fill="#7b91a4" font-size="14" letter-spacing="3">OT / ICS SIMULATION</text><text x="608" y="430" fill="#f0f4f7" font-size="42" font-weight="700">CONPOT</text><path d="M608 466h290" stroke="#24445f"/><text x="608" y="510" fill="#aebbc5" font-size="17">Simulated industrial services</text><text x="608" y="544" fill="#aebbc5" font-size="17">and protocol telemetry</text>

