    <g><rect x="82" y="742" width="436" height="168" fill="#0b1b28" stroke="#24445f"/><text x="112" y="790" fill="#7b91a4" font-size="14" letter-spacing="3">LOGS ANALYZED</text><text x="112" y="866" fill="#57b7ff" font-size="60">8,000+</text>
    <rect x="582" y="742" width="436" height="168" fill="#0b1b28" stroke="#24445f"/><text x="612" y="790" fill="#7b91a4" font-size="14" letter-spacing="3">SUSPICIOUS INTERACTIONS</text><text x="612" y="866" fill="#57b7ff" font-size="60">320+</text>
    <rect x="1082" y="742" width="436" height="168" fill="#0b1b28" stroke="#24445f"/><text x="1112" y="790" fill="#7b91a4" font-size="14" letter-spacing="3">OSINT SOURCES</text><text x="1112" y="850" fill="#f0f4f7" font-size="28">SHODAN</text><text x="1112" y="885" fill="#57b7ff" font-size="28">CENSYS</text></g>
