    <text x="1166" y="325" fill="#f0f4f7" font-size="25">01  COLLECT</text><text x="1166" y="365" fill="#8da0b1" font-size="16">Honeypot interaction logs</text><path d="M1166 398h318" stroke="#24445f"/>
    <text x="1166" y="455" fill="#f0f4f7" font-size="25">02  COMPARE</text><text x="1166" y="495" fill="#8da0b1" font-size="16">Shodan + Censys exposure</text><path d="M1166 528h318" stroke="#24445f"/>
